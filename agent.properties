# ============================================================
# agent-core-java Configuration
# ============================================================
# This file is loaded by AgentConfig.load() and can be
# overridden by environment variables (env takes priority).
#
# Loading order:
#   1. agent.properties (this file)
#   2. Environment variables (AGENT_PROVIDER, AGENT_MODEL, etc.)
#
# You can also set AGENT_CONFIG_FILE=/path/to/custom.properties
# to load a different config file.
# ============================================================

# ── Provider ──────────────────────────────────────────────────
# Supported: openai, anthropic, minimax, or any OpenAI-compatible provider
agent.provider=minimax

# ── Model ─────────────────────────────────────────────────────
# Model ID (provider-specific). Leave blank to use provider default.
agent.model=MiniMax-M2.7

# ── API Key ───────────────────────────────────────────────────
agent.api-key=sk-cp-DAjKgdXduepPdiqaGDhDwEK8VRSNza92K5-mCG25ovlE04NdyH7uKrCZL_JFNVjYoA_yDnpctlpWYfDzD64ArkBR5ZswWfnqR5yy2okOMGDynGrUnvateZw

# ── Base URL ──────────────────────────────────────────────────
agent.base-url=https://api.minimaxi.com/v1

# ── Generation Parameters ─────────────────────────────────────
agent.max-tokens=16384
agent.context-window=204800
agent.temperature=0.7

# ── HTTP Server ───────────────────────────────────────────────
agent.http-port=8080

# ── Timeout ───────────────────────────────────────────────────
# Request timeout in seconds
agent.timeout=120

# ── System Prompt ─────────────────────────────────────────────
agent.system-prompt=You are a helpful assistant.

