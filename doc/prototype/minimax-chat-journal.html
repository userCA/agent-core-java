<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日志 · MiniMax</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        canvas:       'oklch(0.994 0.003 40)',
                        surface:      'oklch(0.975 0.004 50)',
                        'surface-soft':'oklch(0.985 0.003 50)',
                        hairline:     'oklch(0.905 0.006 50)',
                        'hairline-soft':'oklch(0.940 0.005 50)',
                        ink:          'oklch(0.205 0.010 40)',
                        'ink-strong': 'oklch(0.145 0.012 40)',
                        charcoal:     'oklch(0.320 0.010 40)',
                        slate:        'oklch(0.470 0.008 45)',
                        steel:        'oklch(0.575 0.007 48)',
                        stone:        'oklch(0.670 0.006 50)',
                        muted:        'oklch(0.720 0.005 50)',
                        coral:        'oklch(0.645 0.205 30)',
                        magenta:      'oklch(0.605 0.235 352)',
                        blue:         'oklch(0.560 0.165 252)',
                        'blue-deep':  'oklch(0.490 0.180 255)',
                        purple:       'oklch(0.525 0.205 298)',
                        cyan:         'oklch(0.730 0.130 222)',
                        'success-bg': 'oklch(0.940 0.050 152)',
                        'success-text':'oklch(0.500 0.120 155)',
                    },
                    fontFamily: {
                        sans: ['DM Sans', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    borderRadius: {
                        'md2': '8px', 'lg2': '12px', 'xl2': '16px', 'xxl2': '20px', 'xxxl2': '24px', 'hero': '32px', 'pill': '9999px',
                    },
                    boxShadow: {
                        'soft':  '0 1px 2px 0 rgba(20,16,12,0.05)',
                        'card':  '0 4px 10px -2px rgba(20,16,12,0.07)',
                        'modal': '0 16px 32px -8px rgba(20,16,12,0.16)',
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }
        :root {
            --canvas: oklch(0.994 0.003 40);
            --surface: oklch(0.975 0.004 50);
            --surface-soft: oklch(0.985 0.003 50);
            --hairline: oklch(0.905 0.006 50);
            --hairline-soft: oklch(0.940 0.005 50);
            --ink: oklch(0.205 0.010 40);
            --ink-strong: oklch(0.145 0.012 40);
            --charcoal: oklch(0.320 0.010 40);
            --steel: oklch(0.575 0.007 48);
            --coral: oklch(0.645 0.205 30);
            --purple: oklch(0.525 0.205 298);
            --blue: oklch(0.560 0.165 252);
            --grad-agent: linear-gradient(132deg, oklch(0.665 0.210 32) 0%, oklch(0.560 0.215 350) 56%, oklch(0.520 0.205 300) 100%);
        }
        body {
            font-family: 'DM Sans', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            background: oklch(0.965 0.005 50);
            display: flex; align-items: center; justify-content: center;
            -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
        }

        /* Phone frame */
        .phone-frame {
            width: 390px; height: 844px; max-height: 98vh;
            background: var(--canvas);
            border-radius: 44px;
            border: 1px solid var(--hairline);
            box-shadow: 0 30px 90px -18px rgba(20,16,12,0.30), 0 0 0 1px rgba(20,16,12,0.02);
            position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }
        @media (max-width: 420px) {
            .phone-frame { width: 100vw; height: 100vh; max-height: 100vh; border-radius: 0; box-shadow: none; border: none; }
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: oklch(0.86 0.006 50); border-radius: 4px; }

        /* Animations — ease-out only, no bounce */
        @keyframes slideUp { from { transform: translateY(14px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideDown { from { transform: translateY(-8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { 0% { transform: scale(0.94); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes idleFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2.5px); } }
        @keyframes typing { 0%,60%,100% { opacity: 0.3; } 30% { opacity: 1; } }

        .anim-slide-up { animation: slideUp 0.34s cubic-bezier(0.22,1,0.36,1) forwards; }
        .anim-slide-down { animation: slideDown 0.3s cubic-bezier(0.22,1,0.36,1) forwards; }
        .anim-fade-in { animation: fadeIn 0.24s ease-out forwards; }
        .anim-pop-in { animation: popIn 0.26s cubic-bezier(0.22,1,0.36,1) forwards; }
        .idle-float { animation: idleFloat 3.4s ease-in-out infinite; }
        .typing-dot { animation: typing 1.3s ease-in-out infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.16s; }
        .typing-dot:nth-child(3) { animation-delay: 0.32s; }

        @media (prefers-reduced-motion: reduce) {
            .anim-slide-up, .anim-slide-down, .anim-fade-in, .anim-pop-in, .idle-float, .typing-dot { animation: none; }
        }

        /* Message bubbles — black-pill user / quiet-white AI */
        .msg-user {
            background: var(--ink-strong); color: var(--canvas);
            border-radius: 18px 18px 6px 18px;
        }
        .msg-ai {
            background: var(--canvas); color: var(--ink);
            border: 1px solid var(--hairline);
            border-radius: 18px 18px 18px 6px;
            box-shadow: 0 1px 2px 0 rgba(20,16,12,0.04);
        }

        /* Inputs */
        .input-focus:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue); }

        /* Pills / pressable */
        .press { transition: transform 0.14s ease, background-color 0.16s ease, border-color 0.16s ease; }
        .press:active { transform: scale(0.965); }

        /* Black pill primary */
        .btn-primary { background: var(--ink-strong); color: var(--canvas); transition: transform 0.14s ease, background-color 0.16s ease; }
        .btn-primary:active { transform: scale(0.95); background: var(--charcoal); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* Icon utility button */
        .btn-icon { background: var(--canvas); border: 1px solid var(--hairline); transition: background-color 0.16s ease, transform 0.14s ease; }
        .btn-icon:hover { background: var(--surface); }
        .btn-icon:active { transform: scale(0.94); }

        /* Cards */
        .card-quiet { background: var(--canvas); border: 1px solid var(--hairline); transition: box-shadow 0.18s ease, transform 0.14s ease, border-color 0.16s ease; }
        .card-quiet:active { transform: scale(0.99); }
        .journal-card:hover { box-shadow: 0 4px 10px -2px rgba(20,16,12,0.08); border-color: oklch(0.86 0.006 50); }

        /* Sheets */
        .bottom-sheet { transition: transform 0.36s cubic-bezier(0.32,0.72,0,1); }
        .bottom-sheet.hidden-sheet { transform: translateY(101%); }
        .overlay { transition: opacity 0.24s ease; }
        .overlay.hidden-overlay { opacity: 0; pointer-events: none; }

        /* Screen transitions */
        .screen { position: absolute; inset: 0; overflow: hidden; display: flex; flex-direction: column;
            transition: transform 0.34s cubic-bezier(0.32,0.72,0,1), opacity 0.24s ease; }
        .screen-left { transform: translateX(-22%); opacity: 0; pointer-events: none; }
        .screen-right { transform: translateX(100%); opacity: 0; pointer-events: none; }
        .screen-active { transform: translateX(0); opacity: 1; pointer-events: auto; }

        /* Progress (mood) */
        .meter { background: var(--surface); border-radius: 9999px; overflow: hidden; }
        .meter-fill { border-radius: 9999px; background: var(--grad-agent); }

        button:focus-visible, input:focus-visible, textarea:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }

        /* ===== Agent reasoning thread ===== */
        .trace {
            background: var(--canvas);
            border: 1px solid var(--hairline);
            border-radius: 16px;
            box-shadow: 0 1px 2px 0 rgba(20,16,12,0.04);
            overflow: hidden;
        }
        .trace-head {
            width: 100%; display: flex; align-items: center; gap: 9px;
            padding: 10px 14px; cursor: pointer; text-align: left;
            background: var(--surface); transition: background-color 0.18s ease;
        }
        .trace-head:hover { background: oklch(0.965 0.005 50); }
        .trace.collapsed .trace-rail { display: none; }
        .trace-rail { padding: 12px 14px 14px; }
        .thead-ic { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .thead-label { flex: 1; font-size: 13px; font-weight: 600; color: var(--ink); letter-spacing: -0.1px; }

        .t-step { position: relative; padding-left: 28px; }
        .t-step + .t-step { margin-top: 4px; }
        .t-step::before {
            content: ''; position: absolute; left: 9px; top: 20px; bottom: -4px;
            border-left: 1px solid var(--hairline);
        }
        .t-step:last-child::before { display: none; }
        .t-node {
            position: absolute; left: 0; top: 1px;
            width: 19px; height: 19px; border-radius: 50%;
            border: 1px solid var(--hairline); background: var(--surface);
            display: flex; align-items: center; justify-content: center; z-index: 1;
        }
        .t-node.think { background: oklch(0.95 0.045 298); border-color: oklch(0.86 0.07 298); color: var(--purple); }
        .t-node.tool  { background: oklch(0.95 0.04 252); border-color: oklch(0.86 0.06 252); color: var(--blue); }
        .t-node.skill { background: oklch(0.95 0.05 30); border-color: oklch(0.87 0.08 30); color: var(--coral); }
        .t-node.running { background: var(--canvas); }
        .t-node.done  { background: var(--success-bg, oklch(0.94 0.05 152)); border-color: oklch(0.82 0.08 152); color: var(--success-text, oklch(0.50 0.12 155)); }
        .t-node svg { width: 11px; height: 11px; }

        .t-head {
            width: 100%; display: flex; align-items: center; gap: 8px;
            padding: 1px 2px; cursor: pointer; text-align: left;
            border-radius: 8px; transition: background-color 0.18s ease;
        }
        .t-head:hover { background: var(--surface); }
        .t-kind { font-size: 13px; font-weight: 600; color: var(--ink); white-space: nowrap; letter-spacing: -0.1px; }
        .t-sub { font-size: 12px; color: var(--steel); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .t-chev { width: 14px; height: 14px; color: var(--steel); transition: transform 0.2s ease; flex-shrink: 0; }
        .t-step.open > .t-head .t-chev { transform: rotate(90deg); }
        .trace-head .t-chev { transform: rotate(90deg); }
        .trace.collapsed .trace-head .t-chev { transform: rotate(0deg); }

        .t-body { max-height: 0; overflow: hidden; transition: max-height 0.36s ease; }
        .t-step.open > .t-body { max-height: 600px; }
        .t-body-inner { font-size: 12.5px; line-height: 1.65; color: var(--steel); padding: 6px 2px 8px 0; white-space: pre-wrap; word-break: break-word; }
        .t-code {
            background: var(--ink-strong); color: oklch(0.92 0.01 50); border-radius: 8px;
            padding: 9px 11px; margin-top: 7px;
            font-family: ui-monospace,'SF Mono',Menlo,monospace;
            font-size: 11px; line-height: 1.55; white-space: pre-wrap; word-break: break-word;
        }
        .t-cursor { display: inline-block; width: 6px; height: 13px; background: var(--steel); margin-left: 1px; vertical-align: -1px; animation: cursorBlink 1s steps(2) infinite; }
        @keyframes cursorBlink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
        .t-spin { border: 1.5px solid oklch(0.86 0.006 50); border-top-color: var(--ink); border-radius: 50%; animation: tSpin 0.7s linear infinite; }
        @keyframes tSpin { to { transform: rotate(360deg); } }
        .t-result { margin-top: 9px; }
        @media (prefers-reduced-motion: reduce) {
            .t-spin, .t-cursor { animation: none; }
            .t-body { transition: none; }
        }

        .hairline-rule { height: 1px; background: var(--hairline); }
    </style>
</head>
<body>
    <div class="phone-frame" id="phoneFrame">
        <!-- ==================== CHAT SCREEN ==================== -->
        <div class="screen screen-active" id="chatScreen">
            <!-- Header -->
            <header class="flex items-center justify-between px-4 pt-12 pb-3 bg-canvas/90 backdrop-blur-md z-20 border-b border-hairline-soft">
                <button onclick="goToHistory()" class="btn-icon w-9 h-9 flex items-center justify-center rounded-pill" aria-label="历史记录">
                    <i data-lucide="layers" class="w-[18px] h-[18px] text-ink"></i>
                </button>
                <div class="flex flex-col items-center">
                    <h1 class="text-ink font-semibold tracking-tight" style="font-size: 17px; letter-spacing: -0.3px;">日志</h1>
                    <span class="text-[11px] text-steel flex items-center gap-1.5 mt-0.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-success-text"></span>
                        Agent 在线
                    </span>
                </div>
                <button onclick="toggleCompanionPanel()" class="btn-icon w-9 h-9 flex items-center justify-center rounded-pill" aria-label="伙伴面板">
                    <i data-lucide="sliders-horizontal" class="w-[18px] h-[18px] text-ink"></i>
                </button>
            </header>

            <!-- Messages Area -->
            <div class="flex-1 overflow-y-auto custom-scroll px-4 py-5 space-y-4" id="messagesArea">
                <!-- Date divider -->
                <div class="flex items-center justify-center gap-3 py-1">
                    <div class="h-px flex-1 bg-hairline"></div>
                    <span class="text-[11px] text-steel font-medium tracking-wide">今天</span>
                    <div class="h-px flex-1 bg-hairline"></div>
                </div>

                <!-- AI Welcome -->
                <div class="flex gap-2.5 anim-slide-down" style="animation-delay: 0.05s">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5" style="background: var(--grad-agent);">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1"/><circle cx="12" cy="12" r="2.4" fill="#fff" stroke="none"/></svg>
                    </div>
                    <div class="flex-1">
                        <div class="msg-ai inline-block px-4 py-2.5 max-w-[86%] text-[15px] leading-relaxed">
                            早上好，今天想在日志里记录点什么？
                        </div>
                        <span class="text-[10px] text-stone mt-1 ml-1 block">8:32 AM</span>
                    </div>
                </div>

                <!-- User message -->
                <div class="flex gap-2.5 justify-end anim-slide-up" style="animation-delay: 0.12s">
                    <div class="flex-1 flex flex-col items-end">
                        <div class="msg-user inline-block px-4 py-2.5 max-w-[86%] text-[15px] leading-relaxed">
                            我想重构认证模块，能帮我搜一下相关代码吗？
                        </div>
                        <span class="text-[10px] text-stone mt-1 mr-1">8:33 AM</span>
                    </div>
                </div>

                <!-- Typing indicator -->
                <div class="flex gap-2.5" id="typingIndicator" style="display: none;">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5" style="background: var(--grad-agent);">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.4" fill="#fff" stroke="none"/></svg>
                    </div>
                    <div class="msg-ai px-4 py-3">
                        <div class="flex gap-1">
                            <span class="w-1.5 h-1.5 rounded-full bg-steel typing-dot"></span>
                            <span class="w-1.5 h-1.5 rounded-full bg-steel typing-dot"></span>
                            <span class="w-1.5 h-1.5 rounded-full bg-steel typing-dot"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Suggestion Pills -->
            <div class="px-4 pb-2 bg-canvas" id="suggestionPills">
                <div class="flex gap-2 overflow-x-auto pb-1.5 custom-scroll" style="scrollbar-width: none;">
                    <button onclick="sendQuickMessage('搜索认证代码')" class="press flex items-center gap-1.5 px-3.5 py-2 bg-canvas border border-hairline rounded-pill text-[13px] text-ink font-medium whitespace-nowrap">
                        <i data-lucide="search" class="w-3.5 h-3.5 text-steel"></i><span>搜索认证</span>
                    </button>
                    <button onclick="sendQuickMessage('查看 git diff')" class="press flex items-center gap-1.5 px-3.5 py-2 bg-canvas border border-hairline rounded-pill text-[13px] text-ink font-medium whitespace-nowrap">
                        <i data-lucide="git-compare" class="w-3.5 h-3.5 text-steel"></i><span>代码对比</span>
                    </button>
                    <button onclick="sendQuickMessage('运行测试')" class="press flex items-center gap-1.5 px-3.5 py-2 bg-canvas border border-hairline rounded-pill text-[13px] text-ink font-medium whitespace-nowrap">
                        <i data-lucide="play" class="w-3.5 h-3.5 text-steel"></i><span>运行测试</span>
                    </button>
                    <button onclick="sendQuickMessage('帮我重构')" class="press flex items-center gap-1.5 px-3.5 py-2 bg-canvas border border-hairline rounded-pill text-[13px] text-ink font-medium whitespace-nowrap">
                        <i data-lucide="wand-2" class="w-3.5 h-3.5 text-steel"></i><span>重构</span>
                    </button>
                    <button onclick="sendQuickMessage('调试报错')" class="press flex items-center gap-1.5 px-3.5 py-2 bg-canvas border border-hairline rounded-pill text-[13px] text-ink font-medium whitespace-nowrap">
                        <i data-lucide="bug" class="w-3.5 h-3.5 text-steel"></i><span>调试</span>
                    </button>
                    <button onclick="sendQuickMessage('写文档')" class="press flex items-center gap-1.5 px-3.5 py-2 bg-canvas border border-hairline rounded-pill text-[13px] text-ink font-medium whitespace-nowrap">
                        <i data-lucide="file-text" class="w-3.5 h-3.5 text-steel"></i><span>文档</span>
                    </button>
                </div>
            </div>

            <!-- Input Area -->
            <div class="px-4 pb-5 pt-2 bg-canvas border-t border-hairline-soft">
                <div class="flex items-end gap-2">
                    <button onclick="toggleToolDrawer()" class="btn-icon w-11 h-11 flex items-center justify-center rounded-pill flex-shrink-0" aria-label="工具">
                        <i data-lucide="plus" class="w-5 h-5 text-ink"></i>
                    </button>
                    <div class="flex-1 relative">
                        <textarea
                            id="messageInput" rows="1" placeholder="写点什么…"
                            class="w-full px-4 py-3 bg-surface border border-hairline rounded-xl2 text-[15px] text-ink placeholder:text-stone resize-none input-focus leading-relaxed"
                            style="min-height: 44px; max-height: 120px;"
                            oninput="autoResize(this)" onkeydown="handleEnter(event)"></textarea>
                    </div>
                    <button onclick="sendMessage()" id="sendBtn" class="btn-primary w-11 h-11 rounded-pill flex items-center justify-center flex-shrink-0" aria-label="发送">
                        <i data-lucide="arrow-up" class="w-5 h-5"></i>
                    </button>
                </div>

                <!-- Companion chip -->
                <div class="flex justify-center mt-3">
                    <button onclick="toggleCompanionPanel()" class="idle-float press flex items-center gap-2 pl-1.5 pr-3.5 py-1.5 rounded-pill bg-canvas border border-hairline shadow-soft" aria-label="伙伴状态">
                        <span class="w-6 h-6 rounded-full flex items-center justify-center" style="background: var(--grad-agent);">
                            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="11" r="1.1" fill="#fff" stroke="none"/><circle cx="15" cy="11" r="1.1" fill="#fff" stroke="none"/><path d="M9 15c1 1 2 1.4 3 1.4s2-.4 3-1.4"/></svg>
                        </span>
                        <span class="text-[12px] text-ink font-medium">Mochi 在这里</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- ==================== HISTORY SCREEN ==================== -->
        <div class="screen screen-left" id="historyScreen">
            <header class="flex items-center justify-between px-4 pt-12 pb-3 bg-canvas/90 backdrop-blur-md z-20 border-b border-hairline-soft">
                <button onclick="goToChat()" class="btn-icon w-9 h-9 flex items-center justify-center rounded-pill" aria-label="返回">
                    <i data-lucide="arrow-left" class="w-[18px] h-[18px] text-ink"></i>
                </button>
                <h1 class="text-ink font-semibold tracking-tight" style="font-size: 17px; letter-spacing: -0.3px;">日志记录</h1>
                <button onclick="newConversation()" class="btn-icon w-9 h-9 flex items-center justify-center rounded-pill" aria-label="新建">
                    <i data-lucide="plus" class="w-[18px] h-[18px] text-ink"></i>
                </button>
            </header>

            <div class="flex-1 overflow-y-auto custom-scroll px-4 py-4 space-y-3">
                <!-- Search -->
                <div class="relative mb-3">
                    <i data-lucide="search" class="w-4 h-4 text-steel absolute left-3.5 top-1/2 -translate-y-1/2"></i>
                    <input type="text" placeholder="搜索记录…"
                        class="w-full pl-10 pr-4 py-2.5 bg-surface border border-hairline rounded-md2 text-[14px] text-ink placeholder:text-stone input-focus">
                </div>

                <div class="flex items-center gap-3 py-1">
                    <span class="text-[11px] font-medium text-steel tracking-wider uppercase">2026 年 6 月</span>
                    <div class="h-px flex-1 bg-hairline"></div>
                </div>

    <script>
        lucide.createIcons();

        // ---------- Tool grid data ----------
        const TOOLS = [

        // ========== Navigation ==========

        const chatScreen = document.getElementById('chatScreen');
        const historyScreen = document.getElementById('historyScreen');

        function newConversation() {
            goToChat();
            const msgs = document.getElementById('messagesArea');
            msgs.innerHTML = `
                <div class="flex items-center justify-center gap-3 py-1">
                    <div class="h-px flex-1 bg-hairline"></div>

        // ========== Sheets ==========
        function toggleSheet(sheetId, overlayId) {
            const sheet = document.getElementById(sheetId);
            const overlay = document.getElementById(overlayId);
            const hidden = sheet.classList.contains('hidden-sheet');
            sheet.classList.toggle('hidden-sheet', !hidden);

        }
        function toggleToolDrawer() { toggleSheet('toolDrawer', 'toolOverlay'); }
        function toggleCompanionPanel() { toggleSheet('companionPanel', 'companionOverlay'); }

        function petReaction(type) {
            const reactions = { poke: 'Mochi 咯咯笑着蹦来蹦去！', feed: 'Mochi 吃得很开心，真香！', praise: 'Mochi 骄傲地笑了！' };
            const panel = document.getElementById('companionPanel');

            const toast = document.createElement('div');
            toast.className = 'pet-toast anim-pop-in px-4 py-3 rounded-xl2 mb-1';
            toast.style.cssText = 'background: oklch(0.96 0.04 30); border: 1px solid oklch(0.89 0.06 30);';
            toast.innerHTML = `<p class="text-[12.5px] text-ink font-medium">${reactions[type]}</p>`;
            host.insertBefore(toast, host.firstChild);
            setTimeout(() => { toast.style.transition = 'opacity 0.5s ease'; toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 2000);
        }

        // ========== Messaging ==========
        function autoResize(ta) { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 120) + 'px'; }
        function handleEnter(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            addUserMessage(text);
            input.value = ''; input.style.height = 'auto';
            agentTrace(buildScript(text), { animate: true });
        }
        function sendQuickMessage(text) {
            const drawer = document.getElementById('toolDrawer');
            if (drawer && !drawer.classList.contains('hidden-sheet')) toggleToolDrawer();
            addUserMessage(text);
            agentTrace(buildScript(text), { animate: true });
        }
        function addUserMessage(text) {
            const msgs = document.getElementById('messagesArea');
            const div = document.createElement('div');
            div.className = 'flex gap-2.5 justify-end anim-slide-up';
            div.innerHTML = `
                <div class="flex-1 flex flex-col items-end">
                    <div class="msg-user inline-block px-4 py-2.5 max-w-[86%] text-[15px] leading-relaxed">${escapeHtml(text)}</div>
                    <span class="text-[10px] text-stone mt-1 mr-1">${nowTime()}</span>
                </div>`;
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
        }

        // ========== Agent reasoning thread (streaming) ==========
        const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const sleep = (ms) => new Promise(r => setTimeout(r, ms));
        function el(html) { const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstElementChild; }
        function nowTime() { return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }); }
        function scrollMsgs() { const m = document.getElementById('messagesArea'); m.scrollTop = m.scrollHeight; }
        function checkSvg(px) { return '<svg style="width:' + px + 'px;height:' + px + 'px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'; }
        const AI_AVATAR = '<div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5" style="background: var(--grad-agent);"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.4" fill="#fff" stroke="none"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3"/></svg></div>';

        async function streamText(span, text, speed) {
            speed = speed || 14;
            if (reduceMotion) { span.textContent = text; return; }
            const cur = document.createElement('span'); cur.className = 't-cursor';
            span.after(cur);
            for (let i = 0; i < text.length; i++) {
                span.textContent += text[i];
                if (i % 3 === 0) scrollMsgs();
                await sleep(text[i] === '\n' ? speed + 45 : speed);
            }
            cur.remove();
        }

        async function agentTrace(script, opts) {
            const animate = !opts || opts.animate !== false;
            const msgs = document.getElementById('messagesArea');
            const time = nowTime();
            const sendBtn = document.getElementById('sendBtn');
            if (animate && sendBtn) sendBtn.disabled = true;

            const row = el('<div class="flex gap-2.5 anim-slide-down"></div>');
            row.innerHTML = AI_AVATAR + '<div class="flex-1 min-w-0"></div>';
            const wrap = row.lastElementChild;

            const trace = el('<div class="trace mb-1.5 max-w-[92%]"></div>');
            trace.innerHTML =
                '<button type="button" class="trace-head" aria-expanded="true">'
                + '<span class="thead-ic"></span>'
                + '<span class="thead-label">思考中…</span>'
                + '<svg class="t-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>'
                + '</button>'
                + '<div class="trace-rail"></div>';
            const headIc = trace.querySelector('.thead-ic');
            const headLabel = trace.querySelector('.thead-label');
            const rail = trace.querySelector('.trace-rail');
            trace.querySelector('.trace-head').addEventListener('click', () => {
                const c = trace.classList.toggle('collapsed');
                trace.querySelector('.trace-head').setAttribute('aria-expanded', String(!c));
            });
            wrap.appendChild(trace);

            const typing = document.getElementById('typingIndicator');
            if (typing && typing.parentNode === msgs) msgs.insertBefore(row, typing);
            else msgs.appendChild(row);
            scrollMsgs();

            headIc.innerHTML = animate ? '<span class="t-spin" style="width:14px;height:14px;display:block"></span>' : '<span style="color:var(--success-text,oklch(0.50 0.12 155))">' + checkSvg(14) + '</span>';

            for (let i = 0; i < script.steps.length; i++) {
                const s = script.steps[i];
                const step = el('<div class="t-step open"></div>');
                step.innerHTML =
                    '<span class="t-node ' + s.tag + ' running"></span>'
                    + '<button type="button" class="t-head"><span class="t-kind">' + s.title + '</span><span class="t-sub"></span>'
                    + '<svg class="t-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>'
                    + '<div class="t-body"><div class="t-body-inner"></div></div>';
                const node = step.querySelector('.t-node');
                const sub = step.querySelector('.t-sub');
                const bodyInner = step.querySelector('.t-body-inner');
                step.querySelector('.t-head').addEventListener('click', () => step.classList.toggle('open'));
                rail.appendChild(step);

                if (animate) {
                    node.innerHTML = '<span class="t-spin" style="width:11px;height:11px;display:block"></span>';
                    sub.textContent = s.sub;
                    headLabel.textContent = s.title + ' · 进行中';
                    scrollMsgs();
                    const t = document.createElement('span'); bodyInner.appendChild(t);
                    await streamText(t, s.body, 13);
                    if (s.code) {
                        const c = el('<div class="t-code"></div>'); bodyInner.appendChild(c);
                        const cs = document.createElement('span'); c.appendChild(cs);
                        await streamText(cs, s.code, 7);
                    }
                    await sleep(280);
                    node.className = 't-node done'; node.innerHTML = checkSvg(11);
                    sub.textContent = s.done;
                    step.classList.remove('open');
                    await sleep(160);
                } else {
                    node.className = 't-node done'; node.innerHTML = checkSvg(11);
                    sub.textContent = s.done;
                    bodyInner.textContent = s.body;
                    if (s.code) { const c = el('<div class="t-code"></div>'); c.textContent = s.code; bodyInner.appendChild(c); }
                    step.classList.remove('open');
                }
            }

            headLabel.textContent = '推理完成 · ' + script.steps.length + ' 步';
            headIc.innerHTML = '<span style="color:var(--success-text,oklch(0.50 0.12 155))">' + checkSvg(14) + '</span>';
            trace.classList.add('collapsed');
            trace.querySelector('.trace-head').setAttribute('aria-expanded', 'false');

            const ansWrap = el('<div></div>');
            const bubble = el('<div class="msg-ai inline-block px-4 py-2.5 max-w-[92%] text-[15px] leading-relaxed"></div>');
            const p = document.createElement('span'); bubble.appendChild(p);
            ansWrap.appendChild(bubble);
            ansWrap.insertAdjacentHTML('beforeend', '<span class="text-[10px] text-stone mt-1 ml-1 block">' + time + '</span>');
            wrap.appendChild(ansWrap);
            scrollMsgs();

            if (animate) await streamText(p, script.answer, 16);
            else p.textContent = script.answer;
            if (script.card) bubble.insertAdjacentHTML('beforeend', script.card);
            if (sendBtn) sendBtn.disabled = false;
            scrollMsgs();
        }

        // ---- Result card builders (MiniMax quiet-card style) ----
        function fileCard(files) {
            const rows = files.map(f =>
                '<div class="bg-surface rounded-md2 px-3 py-2 text-[12px] text-ink border border-hairline-soft"><span class="text-steel">src/auth/</span><span class="font-semibold">' + f + '</span></div>'
            ).join('');
            return '<div class="t-result card-quiet rounded-lg2 p-3">'
                + '<div class="flex items-center gap-2 mb-2"><span class="w-6 h-6 rounded-md2 bg-surface border border-hairline-soft flex items-center justify-center">'
                + '<svg class="w-3.5 h-3.5 text-ink" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></span>'
                + '<span class="text-[12px] font-semibold text-ink">代码搜索</span>'
                + '<span class="text-[11px] text-steel ml-auto">' + files.length + ' 个结果</span></div>'
                + '<div class="space-y-1.5">' + rows + '</div></div>';
        }
        function listCard(title, items) {
            const lis = items.map(x =>
                '<div class="flex items-start gap-2"><svg class="w-3.5 h-3.5 flex-shrink-0 mt-0.5" style="color:var(--success-text,oklch(0.50 0.12 155))" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
                + '<span class="text-[12px] text-charcoal leading-relaxed">' + x + '</span></div>'
            ).join('');
            return '<div class="t-result card-quiet rounded-lg2 p-3">'
                + '<p class="text-[12px] font-semibold text-ink mb-2">' + title + '</p>'
                + '<div class="space-y-1.5">' + lis + '</div></div>';
        }

        // ---- Map a user message to a reasoning script ----
        function buildScript(text) {
            const t = (text || '').toLowerCase();
            if (t.includes('search') || t.includes('搜索') || t.includes('auth') || t.includes('认证')) return {
                steps: [
                    { tag: 'think', title: '思考', sub: '规划检索范围', done: '锁定 auth 模块',
                      body: '用户要重构认证模块。\n先在 src 下检索认证相关代码，再读候选文件确认边界。' },
                    { tag: 'tool', title: '工具 · Grep', sub: '搜索 auth 关键字', done: '命中 3 个文件',
                      body: '在 src/auth 下检索 token / login 相关实现。',
                      code: '$ grep -rn "authenticate(" src/\n→ 3 matches\n  AuthProvider.java  TokenManager.java  AuthFilter.java' },
                    { tag: 'tool', title: '工具 · Read', sub: '读取候选文件', done: '确认重构入口',
                      body: '快速浏览三个文件的公共方法与依赖关系。' }
                ],
                answer: '在代码库里找到 3 个相关文件，需要我展开某个文件看具体内容吗？',
                card: fileCard(['AuthProvider.java', 'TokenManager.java', 'AuthFilter.java'])
            };
            if (t.includes('refactor') || t.includes('重构')) return {
                steps: [
                    { tag: 'think', title: '思考', sub: '拆解重构目标', done: '理出 3 个步骤',
                      body: '目标是同时提升可读性与可测试性。\n先看现有实现的耦合点，再决定抽取边界。' },
                    { tag: 'tool', title: '工具 · Read', sub: '分析现有实现', done: '定位坏味道',
                      body: '查看 AuthProvider 的构造与校验逻辑。',
                      code: 'class AuthProvider {\n  Token login(Cred c){ /* 校验 + 取 token 混在一起 */ }\n}' },
                    { tag: 'skill', title: '技能 · 重构', sub: '套用重构方案', done: '生成重构补丁',
                      body: '抽出校验类 → 依赖注入 provider → 给 token 加判空。' }
                ],
                answer: '分析完成，建议按这三步重构：',
                card: listCard('重构方案', ['把校验逻辑抽到独立的类', '认证 provider 改用依赖注入', '给 TokenManager 增加空安全判断'])
            };
            if (t.includes('debug') || t.includes('调试') || t.includes('error') || t.includes('报错') || t.includes('bug')) return {
                steps: [
                    { tag: 'think', title: '思考', sub: '复现并定位问题', done: '怀疑空指针',
                      body: '从报错堆栈看，问题出在 token 使用环节，先搜可疑调用。' },
                    { tag: 'tool', title: '工具 · Grep', sub: '定位 token 使用点', done: '锁定第 147 行',
                      body: '检索 token 在 AuthProvider 中的引用位置。',
                      code: '$ grep -n "token." src/auth/AuthProvider.java\n147:  return token.getUserId();  // ← 未判空' },
                    { tag: 'tool', title: '工具 · Read', sub: '检查第 147 行上下文', done: '确认缺少守卫',
                      body: '第 147 行在使用 token 前没有任何 null 检查。' }
                ],
                answer: '找到问题：AuthProvider.java 第 147 行在使用前没有判空。加一个守卫判断即可修复。'
            };
            if (t.includes('test') || t.includes('测试')) return {
                steps: [
                    { tag: 'think', title: '思考', sub: '选择测试范围', done: '只跑 auth 套件',
                      body: '改动集中在 auth 模块，先跑相关单元测试即可。' },
                    { tag: 'tool', title: '工具 · Bash', sub: '运行测试套件', done: '24 个全部通过',
                      body: '执行 auth 模块的测试。',
                      code: '$ mvn -q test -Dtest=Auth*\n... 24 passed in 3.2s   coverage 87%' }
                ],
                answer: '24 个测试全部通过，用时 3.2s，覆盖率 87%。'
            };
            if (t.includes('git') || t.includes('diff') || t.includes('对比')) return {
                steps: [
                    { tag: 'think', title: '思考', sub: '确定对比范围', done: '对比工作区改动',
                      body: '看看最近一次改动都落在哪些文件。' },
                    { tag: 'tool', title: '工具 · Bash', sub: '执行 git diff', done: '+42 / -8',
                      body: '统计本次改动的增删行数。',
                      code: '$ git diff --stat\n auth/AuthProvider.java | 50 ++++++---\n 1 file changed, 42 insertions(+), 8 deletions(-)' }
                ],
                answer: '最新改动：新增 42 行、删除 8 行，主要集中在 auth 模块。'
            };
            if (t.includes('doc') || t.includes('文档')) return {
                steps: [
                    { tag: 'think', title: '思考', sub: '梳理文档结构', done: '定下 3 个章节',
                      body: '按公共 API、配置项、用法示例三部分组织。' },
                    { tag: 'skill', title: '技能 · 文档', sub: '生成模块文档', done: '已生成 Markdown',
                      body: '为 auth 模块的公开接口逐一补充说明与示例。' }
                ],
                answer: '我为 auth 模块生成了文档，涵盖公共 API、配置项和用法示例。还要补充什么吗？'
            };
            if (t.includes('review') || t.includes('评审') || t.includes('解释')) return {
                steps: [
                    { tag: 'think', title: '思考', sub: '确定评审重点', done: '聚焦正确性',
                      body: '重点看输入校验与边界条件。' },
                    { tag: 'tool', title: '工具 · Read', sub: '通读改动', done: '发现 2 处问题',
                      body: '逐行查看本次提交的 diff。' },
                    { tag: 'skill', title: '技能 · 评审', sub: '汇总评审意见', done: '生成评审清单',
                      body: '把发现的问题整理成可执行的修改建议。' }
                ],
                answer: '评审完成，发现 2 个小问题：第 89 行缺少输入校验；第 203 行的魔法数字建议提取为常量。整体结构良好。'
            };
            return {
                steps: [
                    { tag: 'think', title: '思考', sub: '理解你的需求', done: '已理解意图',
                      body: '先确认你想达成的目标，再决定要不要调用工具。' }
                ],
                answer: '明白了，告诉我更多细节，我来帮你。'
            };
        }

        function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }

        // ========== Init ==========
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            agentTrace(buildScript('搜索认证代码'), { animate: false });
            const msgs = document.getElementById('messagesArea');
            msgs.scrollTop = msgs.scrollHeight;
        });
    </script>
</body>
