<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聊天日志</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        peach: {
                            bg: '#f4b89a',
                            light: '#f8c4a8',
                            soft: '#f9d5c0',
                            muted: '#e8a88a',
                        },
                        cream: {
                            bg: '#f9f1d8',
                            card: '#fdf6e3',
                            surface: '#fffbf0',
                            warm: '#f5ecd0',
                        },
                        ink: {
                            DEFAULT: '#3d2b1f',
                            muted: '#7a6b5f',
                            faint: 'rgba(61,43,31,0.4)',
                            ghost: 'rgba(61,43,31,0.15)',
                        },
                        border: {
                            passive: '#e8dcc8',
                            interactive: 'rgba(61,43,31,0.4)',
                        },
                        accent: {
                            pink: '#f4a8a8',
                            sage: '#a8c4a0',
                            sky: '#a8c8e8',
                            lavender: '#c8b8d8',
                            coral: '#e89080',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'system-ui', '-apple-system', 'sans-serif'],
                        hand: ['ZCOOL KuaiLe', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'cursive'],
                        comic: ['ZCOOL KuaiLe', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'cursive'],
                    },
                    borderRadius: {
                        'button': '10px',
                        'card': '16px',
                        'pill': '9999px',
                    },
                    boxShadow: {
                        'dark-btn': '3px 3px 0 #3d2b1f',
                        'card': '3px 3px 0 #3d2b1f',
                        'float': '4px 4px 0 #3d2b1f',
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Inter', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', system-ui, sans-serif;
            background: #f4b89a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Phone frame */
        .phone-frame {
            width: 390px;
            height: 844px;
            max-height: 98vh;
            background: #f9f1d8;
            border-radius: 40px;
            border: 1.5px solid #3d2b1f;
            box-shadow: 1px 1px 0 #3d2b1f, 0 25px 80px rgba(61,43,31,0.15);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 420px) {
            .phone-frame {
                width: 100vw;
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
                box-shadow: none;
                border: none;
            }
        }

        /* Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(61,43,31,0.15); border-radius: 4px; }

        /* Animations */
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes slideDown {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }

        .anim-slide-up { animation: slideUp 0.25s ease-out forwards; }
        .anim-slide-down { animation: slideDown 0.2s ease-out forwards; }
        .anim-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        .anim-pop-in { animation: popIn 0.2s ease-out forwards; }

        .pet-bounce { animation: gentleBounce 2s ease-in-out infinite; }
        .typing-dot { animation: typing 1.2s ease-in-out infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-dot:nth-child(3) { animation-delay: 0.3s; }

        @media (prefers-reduced-motion: reduce) {
            .anim-slide-up, .anim-slide-down, .anim-fade-in, .anim-pop-in,
            .pet-bounce, .typing-dot { animation: none; }
        }

        /* Hand-drawn outline style */
        .hand-drawn {
            border: 1.5px solid #3d2b1f;
            border-radius: 14px;
        }
        .hand-drawn-sm {
            border: 2px solid #3d2b1f;
            border-radius: 10px;
        }
        .hand-drawn-pill {
            border: 1.5px solid #3d2b1f;
            border-radius: 9999px;
        }
        .hand-drawn-circle {
            border: 1.5px solid #3d2b1f;
            border-radius: 50%;
        }

        /* Dashed divider */
        .dashed-divider {
            border-top: 2px dashed #3d2b1f;
            opacity: 0.3;
        }

        /* Message bubbles */
        .msg-user {
            background: #3d2b1f;
            color: #fdf6e3;
            border: 1.5px solid #3d2b1f;
            border-radius: 16px 16px 4px 16px;
            box-shadow: 1px 1px 0 rgba(61,43,31,0.2);
        }
        .msg-ai {
            background: #fffbf0;
            color: #3d2b1f;
            border: 1.5px solid #3d2b1f;
            border-radius: 16px 16px 16px 4px;
            box-shadow: 1px 1px 0 rgba(61,43,31,0.15);
        }

        /* Input focus */
        .input-focus:focus {
            outline: none;
            border-color: #3d2b1f;
            box-shadow: 1px 1px 0 #3d2b1f;
        }

        /* Tool pills */
        .tool-pill {
            transition: all 0.15s ease;
            white-space: nowrap;
            border: 2px solid #3d2b1f;
        }
        .tool-pill:active {
            transform: scale(0.96);
            box-shadow: 1px 1px 0 #3d2b1f;
        }

        /* Dark button */
        .btn-dark {
            background: #3d2b1f;
            color: #fdf6e3;
            border: 1.5px solid #3d2b1f;
            box-shadow: 1px 1px 0 rgba(61,43,31,0.3);
            transition: all 0.15s ease;
        }
        .btn-dark:active { transform: scale(0.96); box-shadow: 1px 1px 0 rgba(61,43,31,0.3); }
        .btn-dark:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

        /* Card hover */
        .journal-card {
            transition: all 0.15s ease;
            border: 1.5px solid #3d2b1f;
        }
        .journal-card:active {
            transform: scale(0.98);
            box-shadow: 1px 1px 0 #3d2b1f;
        }

        /* Companion panel */
        .companion-panel {
            transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .companion-panel.hidden-panel {
            transform: translateY(100%);
        }

        /* Bottom sheet */
        .bottom-sheet {
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
            border: 1.5px solid #3d2b1f;
            border-bottom: none;
        }
        .bottom-sheet.hidden-sheet {
            transform: translateY(100%);
        }

        /* Overlay */
        .overlay {
            transition: opacity 0.2s ease;
        }
        .overlay.hidden-overlay {
            opacity: 0;
            pointer-events: none;
        }

        /* Pet expression transitions */
        .pet-face { transition: all 0.2s ease; }

        /* Focus visible */
        button:focus-visible, input:focus-visible, textarea:focus-visible {
            outline: 3px solid #3d2b1f;
            outline-offset: 2px;
        }

        /* Screen transitions */
        .screen {
            position: absolute;
            inset: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.25s ease-out, opacity 0.2s ease-out;
        }
        .screen-left { transform: translateX(-100%); opacity: 0; pointer-events: none; }
        .screen-right { transform: translateX(100%); opacity: 0; pointer-events: none; }
        .screen-active { transform: translateX(0); opacity: 1; pointer-events: auto; }

        /* Hand-drawn progress bar */
        .hand-progress {
            border: 2px solid #3d2b1f;
            border-radius: 9999px;
            overflow: hidden;
            background: #f5ecd0;
        }
        .hand-progress-fill {
            border-radius: 9999px;
            background: #f4a8a8;
        }

        /* Stitched effect */
        .stitched {
            background-image: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 6px,
                #3d2b1f 6px,
                #3d2b1f 8px,
                transparent 8px,
                transparent 14px
            );
            background-size: 100% 1.5px;
            background-position: 0 0;
            background-repeat: repeat-x;
            opacity: 0.25;
        }

        /* Hand-drawn heart SVG */
        .hand-heart {
            fill: #f4a8a8;
            stroke: #3d2b1f;
            stroke-width: 2;
        }

        /* ===== Agent reasoning thread (thinking / tools / skills) ===== */
        .trace {
            background: #fdf6e3;
            border: 2px solid #3d2b1f;
            border-radius: 16px;
            box-shadow: 3px 3px 0 #3d2b1f;
            overflow: hidden;
        }
        .trace-head {
            width: 100%; display: flex; align-items: center; gap: 8px;
            padding: 9px 12px; cursor: pointer; text-align: left;
            background: #f5ecd0; transition: background-color 0.2s ease;
        }
        .trace-head:hover { background: #efe3c8; }
        .trace.collapsed .trace-rail { display: none; }
        .trace-rail { padding: 10px 12px; }
        .thead-ic { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .thead-label { flex: 1; font-size: 13px; font-weight: 700; color: #3d2b1f; font-family: 'ZCOOL KuaiLe','Noto Sans SC',cursive; }

        .t-step { position: relative; padding-left: 28px; }
        .t-step + .t-step { margin-top: 2px; }
        .t-step::before {
            content: ''; position: absolute; left: 10px; top: 4px; bottom: -2px;
            border-left: 2px dashed rgba(61,43,31,0.30);
        }
        .t-step:last-child::before { display: none; }
        .t-node {
            position: absolute; left: 1px; top: 3px;
            width: 18px; height: 18px; border-radius: 50%;
            border: 2px solid #3d2b1f; background: #f5ecd0;
            display: flex; align-items: center; justify-content: center; z-index: 1;
        }
        .t-node.think { background: #c8b8d8; }
        .t-node.tool  { background: #a8c8e8; }
        .t-node.skill { background: #a8c4a0; }
        .t-node.running { background: #fffbf0; }
        .t-node.done  { background: #a8c4a0; }
        .t-node svg { width: 10px; height: 10px; }

        .t-head {
            width: 100%; display: flex; align-items: center; gap: 7px;
            padding: 3px 2px; cursor: pointer; text-align: left;
            border-radius: 8px; transition: background-color 0.2s ease;
        }
        .t-head:hover { background: rgba(61,43,31,0.05); }
        .t-kind { font-size: 13px; font-weight: 700; color: #3d2b1f; font-family: 'ZCOOL KuaiLe','Noto Sans SC',cursive; white-space: nowrap; }
        .t-sub { font-size: 12px; color: #7a6b5f; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .t-chev { width: 14px; height: 14px; color: #7a6b5f; transition: transform 0.2s ease; flex-shrink: 0; }
        .t-step.open > .t-head .t-chev { transform: rotate(90deg); }
        .trace-head .t-chev { transform: rotate(90deg); }
        .trace.collapsed .trace-head .t-chev { transform: rotate(0deg); }

        .t-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
        .t-step.open > .t-body { max-height: 600px; }
        .t-body-inner { font-size: 12.5px; line-height: 1.65; color: #7a6b5f; padding: 5px 4px 8px 2px; white-space: pre-wrap; word-break: break-word; }
        .t-code {
            background: #3d2b1f; color: #f5ecd0; border-radius: 10px;
            padding: 8px 10px; margin-top: 6px;
            font-family: ui-monospace,'SF Mono',Menlo,monospace;
            font-size: 11px; line-height: 1.5; white-space: pre-wrap; word-break: break-word;
        }
        .t-cursor {
            display: inline-block; width: 6px; height: 13px; background: #7a6b5f;
            margin-left: 1px; vertical-align: -1px; animation: cursorBlink 1s steps(2) infinite;
        }
        @keyframes cursorBlink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
        .t-spin { border: 2px solid rgba(61,43,31,0.25); border-top-color: #3d2b1f; border-radius: 50%; animation: tSpin 0.7s linear infinite; }
        @keyframes tSpin { to { transform: rotate(360deg); } }
        .t-result { margin-top: 8px; }
        @media (prefers-reduced-motion: reduce) {
            .t-spin, .t-cursor { animation: none; }
            .t-body { transition: none; }
        }
    </style>
</head>
<body>
    <div class="phone-frame" id="phoneFrame">
        <!-- ==================== CHAT SCREEN ==================== -->
        <div class="screen screen-active" id="chatScreen">
            <!-- Header -->
            <header class="flex items-center justify-between px-4 pt-12 pb-3 bg-cream-bg/95 backdrop-blur-sm z-20 border-b-2 border-border-passive">
                <button onclick="goToHistory()" class="w-10 h-10 flex items-center justify-center rounded-button hover:bg-ink/5 transition-colors" aria-label="Go to history">
                    <i data-lucide="book-open" class="w-5 h-5 text-ink"></i>
                </button>
                <div class="flex flex-col items-center">
                    <h1 class="text-sm font-bold text-ink tracking-tight font-hand" style="font-size: 16px;">日志</h1>
                    <span class="text-[11px] text-ink-muted flex items-center gap-1 font-comic">
                        <span class="w-2 h-2 rounded-full bg-accent-sage border-2 border-ink"></span>
                        在线
                    </span>
                </div>
                <button onclick="toggleCompanionPanel()" class="w-10 h-10 flex items-center justify-center rounded-button hover:bg-ink/5 transition-colors" aria-label="Open companion panel">
                    <i data-lucide="settings" class="w-5 h-5 text-ink"></i>
                </button>
            </header>

            <!-- Messages Area -->
            <div class="flex-1 overflow-y-auto custom-scroll px-4 py-4 space-y-4" id="messagesArea">
                <!-- Date divider -->
                <div class="flex items-center justify-center gap-3 py-2">
                    <div class="h-px flex-1 dashed-divider"></div>
                    <span class="text-[11px] text-ink-muted font-bold tracking-wide uppercase font-hand" style="font-size: 13px;">今天</span>
                    <div class="h-px flex-1 dashed-divider"></div>
                </div>

                <!-- AI Welcome -->
                <div class="flex gap-3 anim-slide-down" style="animation-delay: 0.1s">
                    <div class="w-8 h-8 rounded-full bg-cream-card border-2 border-ink flex items-center justify-center flex-shrink-0 mt-1 shadow-card">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="#3d2b1f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454z"/>
                            <path d="M12 8v4"/>
                            <path d="M12 16h.01"/>
                        </svg>
                    </div>
                    <div class="flex-1">
                        <div class="msg-ai inline-block px-4 py-3 max-w-[85%] text-[15px] leading-relaxed shadow-card">
                            早上好，今天想在日志里记录点什么？
                        </div>
                        <span class="text-[10px] text-ink-muted mt-1 ml-1 block font-comic">8:32 AM</span>
                    </div>
                </div>

                <!-- User message -->
                <div class="flex gap-3 justify-end anim-slide-up" style="animation-delay: 0.2s">
                    <div class="flex-1 flex flex-col items-end">
                        <div class="msg-user inline-block px-4 py-3 max-w-[85%] text-[15px] leading-relaxed">
                            我想重构认证模块，能帮我搜一下相关代码吗？
                        </div>
                        <span class="text-[10px] text-ink-muted mt-1 mr-1 font-comic">8:33 AM</span>
                    </div>
                </div>

                <!-- AI response with tool -->
                <div class="flex gap-3 anim-slide-down" style="animation-delay: 0.3s">
                    <div class="w-8 h-8 rounded-full bg-cream-card border-2 border-ink flex items-center justify-center flex-shrink-0 mt-1 shadow-card">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="#3d2b1f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454z"/>
                            <path d="M12 8v4"/>
                            <path d="M12 16h.01"/>
                        </svg>
                    </div>
                    <div class="flex-1">
                        <div class="msg-ai inline-block px-4 py-3 max-w-[85%] text-[15px] leading-relaxed shadow-card">
                            好的，我来搜索代码库里和认证相关的代码，稍等。
                        </div>
                        <div class="mt-2 ml-1">
                            <div class="bg-cream-card border-2 border-ink rounded-card p-3 max-w-[90%] shadow-card">
                                <div class="flex items-center gap-2 mb-2">
                                    <div class="w-6 h-6 rounded bg-cream-warm border-2 border-ink flex items-center justify-center">
                                        <i data-lucide="search" class="w-3.5 h-3.5 text-ink"></i>
                                    </div>
                                    <span class="text-xs font-bold text-ink font-hand" style="font-size: 13px;">代码搜索</span>
                                    <span class="text-[10px] text-ink-muted ml-auto font-comic">2 个结果</span>
                                </div>
                                <div class="space-y-1.5">
                                    <div class="bg-white rounded-button px-3 py-2 text-xs text-ink border-2 border-ink">
                                        <span class="text-ink-muted">src/auth/</span><span class="font-bold">AuthProvider.java</span>
                                    </div>
                                    <div class="bg-white rounded-button px-3 py-2 text-xs text-ink border-2 border-ink">
                                        <span class="text-ink-muted">src/auth/</span><span class="font-bold">TokenManager.java</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <span class="text-[10px] text-ink-muted mt-1 ml-1 block font-comic">8:33 AM</span>
                    </div>
                </div>

                <!-- Typing indicator -->
                <div class="flex gap-3" id="typingIndicator" style="display: none;">
                    <div class="w-8 h-8 rounded-full bg-cream-card border-2 border-ink flex items-center justify-center flex-shrink-0 mt-1 shadow-card">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="#3d2b1f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454z"/>
                            <path d="M12 8v4"/>
                            <path d="M12 16h.01"/>
                        </svg>
                    </div>
                    <div class="msg-ai px-4 py-3 shadow-card">
                        <div class="flex gap-1">
                            <span class="w-2 h-2 rounded-full bg-ink-muted typing-dot"></span>
                            <span class="w-2 h-2 rounded-full bg-ink-muted typing-dot"></span>
                            <span class="w-2 h-2 rounded-full bg-ink-muted typing-dot"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Suggestion Pills -->
            <div class="px-4 pb-2 bg-cream-bg" id="suggestionPills">
                <div class="flex gap-2 overflow-x-auto pb-2 custom-scroll" style="scrollbar-width: none;">
                    <button onclick="sendQuickMessage('Search for auth code')" class="tool-pill flex items-center gap-1.5 px-3 py-2 bg-cream-card border-2 border-ink rounded-button text-xs text-ink hover:bg-cream-warm shadow-card">
                        <i data-lucide="search" class="w-3.5 h-3.5 text-ink-muted"></i>
                        <span class="font-comic">搜索认证</span>
                    </button>
                    <button onclick="sendQuickMessage('Show git diff')" class="tool-pill flex items-center gap-1.5 px-3 py-2 bg-cream-card border-2 border-ink rounded-button text-xs text-ink hover:bg-cream-warm shadow-card">
                        <i data-lucide="git-compare" class="w-3.5 h-3.5 text-ink-muted"></i>
                        <span class="font-comic">代码对比</span>
                    </button>
                    <button onclick="sendQuickMessage('Run tests')" class="tool-pill flex items-center gap-1.5 px-3 py-2 bg-cream-card border-2 border-ink rounded-button text-xs text-ink hover:bg-cream-warm shadow-card">
                        <i data-lucide="play" class="w-3.5 h-3.5 text-ink-muted"></i>
                        <span class="font-comic">运行测试</span>
                    </button>
                    <button onclick="sendQuickMessage('Refactor this')" class="tool-pill flex items-center gap-1.5 px-3 py-2 bg-cream-card border-2 border-ink rounded-button text-xs text-ink hover:bg-cream-warm shadow-card">
                        <i data-lucide="wand-2" class="w-3.5 h-3.5 text-ink-muted"></i>
                        <span class="font-comic">重构</span>
                    </button>
                    <button onclick="sendQuickMessage('Debug error')" class="tool-pill flex items-center gap-1.5 px-3 py-2 bg-cream-card border-2 border-ink rounded-button text-xs text-ink hover:bg-cream-warm shadow-card">
                        <i data-lucide="bug" class="w-3.5 h-3.5 text-ink-muted"></i>
                        <span class="font-comic">调试</span>
                    </button>
                    <button onclick="sendQuickMessage('Write docs')" class="tool-pill flex items-center gap-1.5 px-3 py-2 bg-cream-card border-2 border-ink rounded-button text-xs text-ink hover:bg-cream-warm shadow-card">
                        <i data-lucide="file-text" class="w-3.5 h-3.5 text-ink-muted"></i>
                        <span class="font-comic">文档</span>
                    </button>
                </div>

            document.getElementById('historyScreen').classList.remove('screen-left');
            document.getElementById('historyScreen').classList.add('screen-active');
        }

        function goToChat() {
            document.getElementById('historyScreen').classList.remove('screen-active');
            document.getElementById('historyScreen').classList.add('screen-left');
            document.getElementById('chatScreen').classList.remove('screen-right');
            document.getElementById('chatScreen').classList.add('screen-active');
        }

        function newConversation() {
            goToChat();
            // Clear and reset for demo
            const msgs = document.getElementById('messagesArea');
            msgs.innerHTML = `
                <div class="flex items-center justify-center gap-3 py-2">
                    <div class="h-px flex-1 dashed-divider"></div>
                    <span class="text-[11px] text-ink-muted font-bold tracking-wide uppercase font-hand" style="font-size: 13px;">新的一页</span>
                    <div class="h-px flex-1 dashed-divider"></div>
                </div>
                <div class="flex gap-3 anim-slide-down">
                    <div class="w-8 h-8 rounded-full bg-cream-card border-2 border-ink flex items-center justify-center flex-shrink-0 mt-1 shadow-card">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="#3d2b1f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454z"/>
                            <path d="M12 8v4"/>
                            <path d="M12 16h.01"/>
                        </svg>
                    </div>
                    <div class="flex-1">
                        <div class="msg-ai inline-block px-4 py-3 max-w-[85%] text-[15px] leading-relaxed shadow-card">
                            新的一页，今天我们做点什么？
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
            msgs.scrollTop = msgs.scrollHeight;
        }

        // ========== Tool Drawer ==========
        function toggleToolDrawer() {
            const drawer = document.getElementById('toolDrawer');
            const overlay = document.getElementById('toolOverlay');
            const isHidden = drawer.classList.contains('hidden-sheet');

            if (isHidden) {
                drawer.classList.remove('hidden-sheet');
                overlay.classList.remove('hidden-overlay');
            } else {
                drawer.classList.add('hidden-sheet');
                overlay.classList.add('hidden-overlay');
            }
        }

        // ========== Companion Panel ==========
        function toggleCompanionPanel() {
            const panel = document.getElementById('companionPanel');
            const overlay = document.getElementById('companionOverlay');
            const isHidden = panel.classList.contains('hidden-panel');

            if (isHidden) {
                panel.classList.remove('hidden-panel');
                overlay.classList.remove('hidden-overlay');
            } else {
                panel.classList.add('hidden-panel');
                overlay.classList.add('hidden-overlay');
            }
        }

        function petReaction(type) {
            const reactions = {
                poke: 'Mochi 咯咯笑着蹦来蹦去！',
                feed: 'Mochi 吃得很开心，真香！',
                praise: 'Mochi 骄傲地笑了！'
            };
            // Show a tiny toast (using the companion panel content area temporarily)
            const panel = document.getElementById('companionPanel');
            const existing = panel.querySelector('.pet-toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'pet-toast anim-pop-in px-4 py-3 bg-accent-pink/30 border-2 border-ink rounded-card mb-3';
            toast.innerHTML = `<p class="text-xs text-ink font-bold font-comic">${reactions[type]}</p>`;
            panel.querySelector('.px-5.pb-6').insertBefore(toast, panel.querySelector('.px-5.pb-6').firstChild);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.5s ease';
                setTimeout(() => toast.remove(), 500);
            }, 2000);
        }

        // ========== Messaging ==========
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }

        function handleEnter(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            addUserMessage(text);
            input.value = '';
            input.style.height = 'auto';

            agentTrace(buildScript(text), { animate: true });
        }

        function sendQuickMessage(text) {
            // Close the tool drawer only if it is currently open
            const drawer = document.getElementById('toolDrawer');
            if (drawer && !drawer.classList.contains('hidden-sheet')) toggleToolDrawer();

            addUserMessage(text);
            agentTrace(buildScript(text), { animate: true });
        }

        function addUserMessage(text) {
            const msgs = document.getElementById('messagesArea');
            const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
            const div = document.createElement('div');
            div.className = 'flex gap-3 justify-end anim-slide-up';
            div.innerHTML = `
                <div class="flex-1 flex flex-col items-end">
                    <div class="msg-user inline-block px-4 py-3 max-w-[85%] text-[15px] leading-relaxed">${escapeHtml(text)}</div>
                    <span class="text-[10px] text-ink-muted mt-1 mr-1 font-comic">${time}</span>
                </div>
            `;
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
        }

        // ========== Agent reasoning thread (streaming) ==========
        const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const sleep = (ms) => new Promise(r => setTimeout(r, ms));
        function el(html) { const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstElementChild; }
        function nowTime() { return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }); }
        function scrollMsgs() { const m = document.getElementById('messagesArea'); m.scrollTop = m.scrollHeight; }
        function checkSvg(px) { return '<svg style="width:' + px + 'px;height:' + px + 'px" viewBox="0 0 24 24" fill="none" stroke="#3d2b1f" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'; }
        const AI_AVATAR = '<div class="w-8 h-8 rounded-full bg-cream-card border-2 border-ink flex items-center justify-center flex-shrink-0 mt-1 shadow-card"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="#3d2b1f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454z"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg></div>';

        async function streamText(span, text, speed) {
            speed = speed || 14;
            if (reduceMotion) { span.textContent = text; return; }
            const cur = document.createElement('span'); cur.className = 't-cursor';
            span.after(cur);
            for (let i = 0; i < text.length; i++) {
                span.textContent += text[i];
                if (i % 3 === 0) scrollMsgs();
                await sleep(text[i] === '\n' ? speed + 45 : speed);
            }
            cur.remove();
        }

        // Render one assistant turn: a collapsible reasoning thread that
        // streams step-by-step (think -> tools -> skill), folds into a chip,
        // then streams the final answer into the bubble.
        async function agentTrace(script, opts) {
            const animate = !opts || opts.animate !== false;
            const msgs = document.getElementById('messagesArea');
            const time = nowTime();
            const sendBtn = document.getElementById('sendBtn');
            if (animate && sendBtn) sendBtn.disabled = true;

            const row = el('<div class="flex gap-3 anim-slide-down"></div>');
            row.innerHTML = AI_AVATAR + '<div class="flex-1 min-w-0"></div>';
            const wrap = row.lastElementChild;

            const trace = el('<div class="trace mb-1 max-w-[90%]"></div>');
            trace.innerHTML =
                '<button type="button" class="trace-head" aria-expanded="true">'
                + '<span class="thead-ic"></span>'
                + '<span class="thead-label">思考中…</span>'
                + '<svg class="t-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>'
                + '</button>'
                + '<div class="trace-rail"></div>';
            const headIc = trace.querySelector('.thead-ic');
            const headLabel = trace.querySelector('.thead-label');
            const rail = trace.querySelector('.trace-rail');
            trace.querySelector('.trace-head').addEventListener('click', () => {
                const c = trace.classList.toggle('collapsed');
                trace.querySelector('.trace-head').setAttribute('aria-expanded', String(!c));
            });
            wrap.appendChild(trace);

            const typing = document.getElementById('typingIndicator');
            if (typing && typing.parentNode === msgs) msgs.insertBefore(row, typing);
            else msgs.appendChild(row);
            scrollMsgs();

            headIc.innerHTML = animate ? '<span class="t-spin" style="width:14px;height:14px;display:block"></span>' : checkSvg(13);

            for (let i = 0; i < script.steps.length; i++) {
                const s = script.steps[i];
                const step = el('<div class="t-step open"></div>');
                step.innerHTML =
                    '<span class="t-node ' + s.tag + ' running"></span>'
                    + '<button type="button" class="t-head"><span class="t-kind">' + s.title + '</span><span class="t-sub"></span>'
                    + '<svg class="t-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>'
                    + '<div class="t-body"><div class="t-body-inner"></div></div>';
                const node = step.querySelector('.t-node');
                const sub = step.querySelector('.t-sub');
                const bodyInner = step.querySelector('.t-body-inner');
                step.querySelector('.t-head').addEventListener('click', () => step.classList.toggle('open'));
                rail.appendChild(step);

                if (animate) {
                    node.innerHTML = '<span class="t-spin" style="width:10px;height:10px;display:block"></span>';
                    sub.textContent = s.sub;
                    headLabel.textContent = s.title + ' · 进行中';
                    scrollMsgs();
                    const t = document.createElement('span'); bodyInner.appendChild(t);
                    await streamText(t, s.body, 13);
                    if (s.code) {
                        const c = el('<div class="t-code"></div>'); bodyInner.appendChild(c);
                        const cs = document.createElement('span'); c.appendChild(cs);
                        await streamText(cs, s.code, 7);
                    }
                    await sleep(280);
                    node.className = 't-node done'; node.innerHTML = checkSvg(10);
                    sub.textContent = s.done;
                    step.classList.remove('open');
                    await sleep(160);
                } else {
                    node.className = 't-node done'; node.innerHTML = checkSvg(10);
                    sub.textContent = s.done;
                    bodyInner.textContent = s.body;
                    if (s.code) { const c = el('<div class="t-code"></div>'); c.textContent = s.code; bodyInner.appendChild(c); }
                    step.classList.remove('open');
                }
            }

            headLabel.textContent = '推理完成 · ' + script.steps.length + ' 步';
            headIc.innerHTML = checkSvg(13);
            trace.classList.add('collapsed');
            trace.querySelector('.trace-head').setAttribute('aria-expanded', 'false');

            const ansWrap = el('<div></div>');
            const bubble = el('<div class="msg-ai inline-block px-4 py-3 max-w-[90%] text-[15px] leading-relaxed shadow-card"></div>');
            const p = document.createElement('span'); bubble.appendChild(p);
            ansWrap.appendChild(bubble);
            ansWrap.insertAdjacentHTML('beforeend', '<span class="text-[10px] text-ink-muted mt-1 ml-1 block font-comic">' + time + '</span>');
            wrap.appendChild(ansWrap);
            scrollMsgs();

            if (animate) await streamText(p, script.answer, 16);
            else p.textContent = script.answer;
            if (script.card) bubble.insertAdjacentHTML('beforeend', script.card);
            if (sendBtn) sendBtn.disabled = false;
            scrollMsgs();
        }

        // ---- Result card builders (match the static tool-card style) ----
        function fileCard(files) {
            const rows = files.map(f =>
                '<div class="bg-white rounded-button px-3 py-2 text-xs text-ink border-2 border-ink"><span class="text-ink-muted">src/auth/</span><span class="font-bold">' + f + '</span></div>'
            ).join('');
            return '<div class="t-result bg-cream-card border-2 border-ink rounded-card p-3 shadow-card">'
                + '<div class="flex items-center gap-2 mb-2"><div class="w-6 h-6 rounded bg-cream-warm border-2 border-ink flex items-center justify-center">'
                + '<svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="#3d2b1f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></div>'
                + '<span class="text-xs font-bold text-ink font-hand" style="font-size:13px">代码搜索</span>'
                + '<span class="text-[10px] text-ink-muted ml-auto font-comic">' + files.length + ' 个结果</span></div>'
                + '<div class="space-y-1.5">' + rows + '</div></div>';
        }
        function listCard(title, items) {
            const lis = items.map(x =>
                '<div class="flex items-start gap-2"><svg class="w-3.5 h-3.5 flex-shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="#3d2b1f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
                + '<span class="text-xs text-ink-muted leading-relaxed font-comic">' + x + '</span></div>'
            ).join('');
            return '<div class="t-result bg-cream-card border-2 border-ink rounded-card p-3 shadow-card">'
                + '<p class="text-xs font-bold text-ink mb-2 font-hand" style="font-size:13px">' + title + '</p>'
                + '<div class="space-y-1.5">' + lis + '</div></div>';
        }

        // ---- Map a user message to a reasoning script ----
        function buildScript(text) {
            const t = (text || '').toLowerCase();
            if (t.includes('search') || t.includes('搜索') || t.includes('auth') || t.includes('认证')) return {
                steps: [
                    { tag: 'think', title: '思考', sub: '规划检索范围', done: '锁定 auth 模块',
                      body: '用户要重构认证模块。\n先在 src 下检索认证相关代码，再读候选文件确认边界。' },
                    { tag: 'tool', title: '工具 · Grep', sub: '搜索 auth 关键字', done: '命中 3 个文件',
                      body: '在 src/auth 下检索 token / login 相关实现。',
                      code: '$ grep -rn "authenticate(" src/\n→ 3 matches\n  AuthProvider.java  TokenManager.java  AuthFilter.java' },
                    { tag: 'tool', title: '工具 · Read', sub: '读取候选文件', done: '确认重构入口',
                      body: '快速浏览三个文件的公共方法与依赖关系。' }
                ],
                answer: '在代码库里找到 3 个相关文件，需要我展开某个文件看具体内容吗？',
                card: fileCard(['AuthProvider.java', 'TokenManager.java', 'AuthFilter.java'])
            };
            if (t.includes('refactor') || t.includes('重构')) return {
                steps: [
                    { tag: 'think', title: '思考', sub: '拆解重构目标', done: '理出 3 个步骤',
                      body: '目标是同时提升可读性与可测试性。\n先看现有实现的耦合点，再决定抽取边界。' },
                    { tag: 'tool', title: '工具 · Read', sub: '分析现有实现', done: '定位坏味道',
                      body: '查看 AuthProvider 的构造与校验逻辑。',
                      code: 'class AuthProvider {\n  Token login(Cred c){ /* 校验 + 取 token 混在一起 */ }\n}' },
                    { tag: 'skill', title: '技能 · 重构', sub: '套用重构方案', done: '生成重构补丁',
                      body: '抽出校验类 → 依赖注入 provider → 给 token 加判空。' }
                ],
                answer: '分析完成，建议按这三步重构：',
                card: listCard('重构方案', ['把校验逻辑抽到独立的类', '认证 provider 改用依赖注入', '给 TokenManager 增加空安全判断'])
            };
            if (t.includes('debug') || t.includes('调试') || t.includes('error') || t.includes('bug')) return {
                steps: [
                    { tag: 'think', title: '思考', sub: '复现并定位问题', done: '怀疑空指针',
                      body: '从报错堆栈看，问题出在 token 使用环节，先搜可疑调用。' },
                    { tag: 'tool', title: '工具 · Grep', sub: '定位 token 使用点', done: '锁定第 147 行',
                      body: '检索 token 在 AuthProvider 中的引用位置。',
                      code: '$ grep -n "token." src/auth/AuthProvider.java\n147:  return token.getUserId();  // ← 未判空' },
                    { tag: 'tool', title: '工具 · Read', sub: '检查第 147 行上下文', done: '确认缺少守卫',
                      body: '第 147 行在使用 token 前没有任何 null 检查。' }
                ],
                answer: '找到问题：AuthProvider.java 第 147 行在使用前没有判空。加一个守卫判断即可修复。'
            };
            if (t.includes('test') || t.includes('测试')) return {
                steps: [
                    { tag: 'think', title: '思考', sub: '选择测试范围', done: '只跑 auth 套件',
                      body: '改动集中在 auth 模块，先跑相关单元测试即可。' },
                    { tag: 'tool', title: '工具 · Bash', sub: '运行测试套件', done: '24 个全部通过',
                      body: '执行 auth 模块的测试。',
                      code: '$ mvn -q test -Dtest=Auth*\n... 24 passed in 3.2s   coverage 87%' }
                ],
                answer: '24 个测试全部通过，用时 3.2s，覆盖率 87%。'
            };
            if (t.includes('git') || t.includes('diff') || t.includes('对比')) return {
                steps: [
                    { tag: 'think', title: '思考', sub: '确定对比范围', done: '对比工作区改动',
                      body: '看看最近一次改动都落在哪些文件。' },
                    { tag: 'tool', title: '工具 · Bash', sub: '执行 git diff', done: '+42 / -8',
                      body: '统计本次改动的增删行数。',
                      code: '$ git diff --stat\n auth/AuthProvider.java | 50 ++++++---\n 1 file changed, 42 insertions(+), 8 deletions(-)' }
                ],
                answer: '最新改动：新增 42 行、删除 8 行，主要集中在 auth 模块。'
            };
            if (t.includes('doc') || t.includes('文档')) return {
                steps: [
                    { tag: 'think', title: '思考', sub: '梳理文档结构', done: '定下 3 个章节',
                      body: '按公共 API、配置项、用法示例三部分组织。' },
                    { tag: 'skill', title: '技能 · 文档', sub: '生成模块文档', done: '已生成 Markdown',
                      body: '为 auth 模块的公开接口逐一补充说明与示例。' }
                ],
                answer: '我为 auth 模块生成了文档，涵盖公共 API、配置项和用法示例。还要补充什么吗？'
            };
            if (t.includes('review') || t.includes('评审')) return {
                steps: [
                    { tag: 'think', title: '思考', sub: '确定评审重点', done: '聚焦正确性',
                      body: '重点看输入校验与边界条件。' },
                    { tag: 'tool', title: '工具 · Read', sub: '通读改动', done: '发现 2 处问题',
                      body: '逐行查看本次提交的 diff。' },
                    { tag: 'skill', title: '技能 · 评审', sub: '汇总评审意见', done: '生成评审清单',
                      body: '把发现的问题整理成可执行的修改建议。' }
                ],
                answer: '评审完成，发现 2 个小问题：第 89 行缺少输入校验；第 203 行的魔法数字建议提取为常量。整体结构良好。'
            };
            return {
                steps: [
                    { tag: 'think', title: '思考', sub: '理解你的需求', done: '已理解意图',
                      body: '先确认你想达成的目标，再决定要不要调用工具。' }
                ],
                answer: '明白了，告诉我更多细节，我来帮你。'
            };
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== Init ==========
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            // Showcase a completed reasoning thread in the static conversation
            agentTrace(buildScript('refactor auth module'), { animate: false });
            const msgs = document.getElementById('messagesArea');
            msgs.scrollTop = msgs.scrollHeight;
        });
    </script>
